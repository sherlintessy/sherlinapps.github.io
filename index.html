<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SherlinApps Support</title>
    <style>
        /* 1. Basic Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* 2. Background setup with fallback */
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #764ba2; /* Fallback color */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* 3. The Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
        }

        h1 { margin-bottom: 10px; font-size: 24px; }
        p { opacity: 0.9; margin-bottom: 25px; font-size: 15px; line-height: 1.5; }

        .btn {
            display: block;
            background: #fff;
            color: #764ba2;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover { background: #f0f0f0; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">S</div>
        <h1>SherlinApps</h1>
        <p>Support & Feedback<br>How can we help you today?</p>
        
        <a href="mailto:sherlinapps@gmail.com" class="btn">Contact Support</a>
    </div>

</body>
</html>
